aid: big-lots
name: Big Lots
description: >-
  Big Lots is a discount retailer offering a wide assortment of brand-name
  closeout merchandise including furniture, food, consumables, seasonal
  products, soft home, hard home, and electronics. Big Lots operated hundreds
  of stores across the United States. In 2024, Big Lots filed for bankruptcy
  and its brand and operations were acquired by Nexus Capital Management.
